<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cat mai e pana plec acasa!</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body  {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(180deg, #181f33 0%, #fbd83b 100%);
    color: #fff;
    min-height: 100vh;
    padding: 30px 20px;
}
h1 {
    text-align: center;
    font-size: 2.4em;
    margin-bottom: 20px;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.4);
}

/* ---------- FLIP CLOCK STYLES ---------- */
.flip-countdown {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 18px;
    flex-wrap: wrap;
    margin: 30px 0 50px;
}
.flip-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}
.flip-digits {
    display: flex;
    gap: 6px;
}
.flip-card {
    position: relative;
    width: 70px;
    height: 100px;
    perspective: 400px;
    background: #111;
    border-radius: 8px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.45),
                inset 0 0 0 1px rgba(255,255,255,0.05);
    overflow: hidden;
    font-family: 'Courier New', monospace;
}
.flip-card::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 2px;
    background: rgba(0,0,0,0.85);
    z-index: 5;
    transform: translateY(-1px);
}
.flip-card .top,
.flip-card .bottom,
.flip-card .flip-top,
.flip-card .flip-bottom {
    position: absolute;
    left: 0;
    right: 0;
    height: 50%;
    overflow: hidden;
    display: flex;
    justify-content: center;
    background: linear-gradient(180deg, #2a2a2a, #1a1a1a);
    color: #fbd83b;
    font-size: 4em;

// ----- Countdown -----
function updateCountdown() {
    const now = new Date();
    let diff = TARGET - now;
    if (diff < 0) diff = 0;
    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff / (1000*60*60)) % 24);
    const m = Math.floor((diff / (1000*60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    updateUnit('days',    d, 3);
    updateUnit('hours',   h, 2);
    updateUnit('minutes', m, 2);
    updateUnit('seconds', s, 2);
}
updateCountdown();
setInterval(updateCountdown, 1000);

// ----- Calendars -----
const months = [
    { name: 'MAI',    year: 2026, month: 4 },
    { name: 'IUNIE',  year: 2026, month: 5 },
    { name: 'IULIE',  year: 2026, month: 6 },
    { name: 'AUGUST', year: 2026, month: 7 }
];
const DOW = ['Lun','Mar','Mie','Joi','Vin','Sam','Dum'];

function sameDay(a, b) {
    return a.getFullYear() === b.getFullYear()
        && a.getMonth() === b.getMonth()
        && a.getDate() === b.getDate();
}

function buildCalendars() {
    const today = new Date();
    today.setHours(0,0,0,0);
    const container = document.getElementById('calendars');
    container.innerHTML = '';

    months.forEach(m => {
        const cal = document.createElement('div');
        cal.className = 'calendar';
        const title = document.createElement('h2');
        title.textContent = m.name;
        cal.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'cal-grid';

        DOW.forEach(d => {
            const el = document.createElement('div');
            el.className = 'dow';
            el.textContent = d;
            grid.appendChild(el);
        });

        const firstDay = new Date(m.year, m.month, 1);
        const startDow = (firstDay.getDay() + 6) % 7;
        const daysInMonth = new Date(m.year, m.month + 1, 0).getDate();

        for (let i = 0; i < startDow; i++) {
            const e = document.createElement('div');
            e.className = 'day empty';
            grid.appendChild(e);
        }

        for (let day = 1; day <= daysInMonth; day++) {
            const cell = document.createElement('div');
            cell.className = 'day';
            cell.textContent = day;
            const date = new Date(m.year, m.month, day);

            if (date < START) {
                cell.classList.add('before-start');
            } else if (sameDay(date, TARGET)) {
                cell.classList.add('target');
            } else if (sameDay(date, today)) {
                cell.classList.add('today');
            } else if (date < today && date >= START) {
                cell.classList.add('passed');
            }
            grid.appendChild(cell);
        }
        cal.appendChild(grid);
        container.appendChild(cal);
    });
}

buildCalendars();
// Rebuild at midnight to keep "today" / "passed" accurate
setInterval(buildCalendars, 60 * 60 * 1000);
</script>

</body>
</html>
